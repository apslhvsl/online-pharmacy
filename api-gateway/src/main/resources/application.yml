server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # ── Auth Service ──────────────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - PreserveHostHeader

        # ── Catalog Service ───────────────────────────────────────────
        - id: catalog-internal-block
          uri: no://op
          predicates:
            - Path=/api/catalog/internal/**
          filters:
            - SetStatus=404

        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/catalog/**
          filters:
            - PreserveHostHeader

        # ── Order Service ─────────────────────────────────────────────
        - id: order-internal-block
          uri: no://op
          predicates:
            - Path=/api/orders/internal/**
          filters:
            - SetStatus=404

        - id: auth-internal-block
          uri: no://op
          predicates:
            - Path=/api/auth/internal/**
          filters:
            - SetStatus=404

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - PreserveHostHeader

        # ── Admin Service ─────────────────────────────────────────────
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - PreserveHostHeader

        # ── Swagger api-docs aggregation ──────────────────────────────
        - id: auth-api-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/v3/api-docs, /v3/api-docs

        - id: catalog-api-docs
          uri: lb://catalog-service
          predicates:
            - Path=/catalog-service/v3/api-docs
          filters:
            - RewritePath=/catalog-service/v3/api-docs, /v3/api-docs

        - id: order-api-docs
          uri: lb://order-service
          predicates:
            - Path=/order-service/v3/api-docs
          filters:
            - RewritePath=/order-service/v3/api-docs, /v3/api-docs

        - id: admin-api-docs
          uri: lb://admin-service
          predicates:
            - Path=/admin-service/v3/api-docs
          filters:
            - RewritePath=/admin-service/v3/api-docs, /v3/api-docs

      httpclient:
        connect-timeout: 5000
        response-timeout: 5s

  codec:
    max-in-memory-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:a1c1e21c711dc90f0c38b77935b747eafa1106afea7a1aeba09cfe3e34517bab6ba2496436461bc1600d50637e71421d}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    org.springframework.cloud.gateway: INFO
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: true
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true
    urls:
      - name: auth-service
        url: /auth-service/v3/api-docs
      - name: catalog-service
        url: /catalog-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
      - name: admin-service
        url: /admin-service/v3/api-docs
  webjars:
    prefix: ""
