<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; color: #333;">
  <div style="max-width: 600px; margin: auto; padding: 24px; border: 1px solid #e0e0e0; border-radius: 8px;">
    <h2 style="color: #2c7be5;">Password Reset Request</h2>
    <p>Hi <span th:text="${userName}">User</span>,</p>
    <p>We received a request to reset your password. Use the token below:</p>

    <div style="background:#f0f4ff; padding:16px; border-radius:6px; text-align:center; margin:16px 0;">
      <strong style="font-size:20px; letter-spacing:2px;" th:text="${resetToken}">TOKEN</strong>
    </div>

    <p>This token expires at <strong th:text="${#temporals.format(expiresAt, 'dd MMM yyyy, hh:mm a')}">-</strong>.</p>
    <p>If you did not request a password reset, please ignore this email.</p>

    <p style="color:#888; font-size:12px;">For security, never share this token with anyone.</p>
  </div>
</body>
</html>
